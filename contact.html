<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | AT Studio.3d</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --neon-blue: #00f3ff;
            --neon-purple: #9d4edd;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 243, 255, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(157, 78, 221, 0.1), transparent 40%);
        }

        .contact-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #000;
            font-weight: bold;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--neon-blue), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .contact-item i {
            font-size: 1.4rem;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .contact-item .label {
            flex-grow: 1;
            text-align: left;
            font-weight: 500;
        }

        /* Кнопка БОТА - головний акцент */
        .bot-btn {
            background: linear-gradient(45deg, rgba(0, 243, 255, 0.15), rgba(157, 78, 221, 0.15));
            border-color: var(--neon-blue);
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .bot-btn:hover {
            background: var(--neon-blue);
            color: #000 !important;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            transform: scale(1.03);
        }

        /* Інші кнопки */
        .contact-item:not(.bot-btn):hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--neon-purple);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: var(--neon-blue); }

        .footer-tag {
            margin-top: 25px;
            font-size: 1.1rem;
            color: var(--neon-blue);
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="profile-img">AT</div>
        <h1>AT Studio.3d</h1>
        <div class="status"><i class="fa-solid fa-check-circle"></i> Офіційні контакти</div>
        
        <div class="contact-list">
            <a href="https://t.me/at_studio_3d_bot" target="_blank" class="contact-item bot-btn">
                <i class="fa-solid fa-robot"></i>
                <div class="label">Запустити Бота (Замовити)</div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="https://t.me/at_studio_3d" target="_blank" class="contact-item">
                <i class="fa-brands fa-telegram"></i>
                <div class="label">Наш Telegram Канал</div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="https://instagram.com/at_studio.3d" target="_blank" class="contact-item">
                <i class="fa-brands fa-instagram"></i>
                <div class="label">Instagram</div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="https://tiktok.com/@at.studio.3d" target="_blank" class="contact-item">
                <i class="fa-brands fa-tiktok"></i>
                <div class="label">TikTok</div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>

        <a href="index.html" class="back-link">← Повернутися на сайт</a>
        <div class="footer-tag">@at_studio.3d</div>
    </div>

</body>
</html>
