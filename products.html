<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товарів | AT Studio.3d</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050508;
            --text-color: #e0e0e0;
            --neon-blue: #00f3ff;
            --neon-purple: #9d4edd;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }

        /* ФОН */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 30%),
                        radial-gradient(circle at 85% 30%, rgba(157, 78, 221, 0.08), transparent 30%);
            z-index: -1;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(10px); position: fixed;
            width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 1px; text-decoration: none; }
        .logo span { color: var(--neon-blue); }

        .container { max-width: 1200px; margin: 120px auto 60px; padding: 0 20px; }
        
        .page-title { font-size: 3rem; text-align: center; background: linear-gradient(90deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }

        /* СІТКА ТОВАРІВ */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .product-card { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 20px; transition: 0.4s; cursor: pointer; text-align: center;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--neon-blue); box-shadow: 0 10px 30px rgba(0, 243, 255, 0.1); }
        
        .product-img-preview { 
            width: 100%; height: 200px; background: rgba(255,255,255,0.03); 
            border-radius: 15px; margin-bottom: 15px; display: flex; 
            align-items: center; justify-content: center; font-size: 3.5rem; color: var(--neon-blue);
        }

        /* МОДАЛЬНЕ ВІКНО */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 20px;
        }

        .modal-content {
            background: #0a0a0f; border: 1px solid var(--glass-border);
            width: 100%; max-width: 900px; border-radius: 30px; position: relative;
            display: flex; flex-direction: row; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
        }

        .close-modal {
            position: absolute; top: 20px; right: 25px; color: #fff; font-size: 30px;
            cursor: pointer; z-index: 10; transition: 0.3s;
        }
        .close-modal:hover { color: var(--neon-blue); }

        .modal-left { flex: 1; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; padding: 40px; border-right: 1px solid var(--glass-border); }
        .modal-left i { font-size: 8rem; color: var(--neon-blue); text-shadow: 0 0 30px rgba(0, 243, 255, 0.3); }

        .modal-right { flex: 1.2; padding: 60px 40px; display: flex; flex-direction: column; justify-content: center; }
        
        .modal-category { color: var(--neon-purple); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .modal-title { font-size: 2.5rem; color: #fff; margin-bottom: 20px; line-height: 1.1; }
        .modal-description { color: #aaa; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }
        
        .modal-price { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 30px; display: block; }
        .modal-price span { color: var(--neon-blue); }

        .btn-order {
            padding: 18px 40px; border-radius: 12px; background: var(--neon-blue);
            color: #000; text-decoration: none; font-weight: 700; text-align: center;
            transition: 0.3s; font-size: 1.1rem;
        }
        .btn-order:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0, 243, 255, 0.4); }

        /* АДАПТИВНІСТЬ */
        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-left { padding: 40px; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .modal-right { padding: 30px; }
            .modal-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AT Studio<span>.3d</span></a>
        <a href="index.html" style="color: #888; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> На головну</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Каталог</h1>

        <div class="products-grid">
            <div class="product-card" onclick="openModal('Mini Магічний конус', 'Компактна антистрес-іграшка з унікальною геометрією. Друкується високоякісним пластиком PLA. Ідеально підходить для того, щоб зайняти руки під час роботи або навчання.', '5 ₴', 'fa-rug', 'ІГРАШКИ')">
                <div class="product-img-preview"><i class="fa-solid fa-rug"></i></div>
                <h3>Mini Конус</h3>
                <p style="color: var(--neon-blue); margin-top: 10px;">5 ₴</p>
            </div>

            <div class="product-card" onclick="openModal('Кріплення WAGO 221', 'Технічне кріплення для клемників WAGO серії 221. Доступні версії на 2, 3 та 4 контакти. Забезпечує надійну фіксацію та порядок у розподільчій коробці.', 'В розробці', 'fa-plug', 'ТЕХНІЧНІ ВИРОБИ')">
                <div class="product-img-preview"><i class="fa-solid fa-plug"></i></div>
                <h3>Кріплення WAGO</h3>
                <p style="color: #888; margin-top: 10px;">Детальніше</p>
            </div>

            <div class="product-card" onclick="openModal('3D Візитки', 'Ексклюзивні візитки з об’ємним текстом та логотипом. Матеріал на вибір. Таку візитку точно не викинуть у смітник!', 'В розробці', 'fa-address-card', 'ВІЗИТКИ')">
                <div class="product-img-preview"><i class="fa-solid fa-address-card"></i></div>
                <h3>3D Візитки</h3>
                <p style="color: #888; margin-top: 10px;">Детальніше</p>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div class="modal-left" id="modalIconBox">
                <i class="fa-solid fa-box" id="modalIcon"></i>
            </div>
            
            <div class="modal-right">
                <span class="modal-category" id="modalCategory">Категорія</span>
                <h2 class="modal-title" id="modalTitle">Назва товару</h2>
                <p class="modal-description" id="modalDesc">Опис товару з'явиться тут...</p>
                <div class="modal-price" id="modalPrice">0 ₴</div>
                <a href="index.html#order-section" class="btn-order">ЗАМОВИТИ ЗАРАЗ</a>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("productModal");

        function openModal(title, desc, price, icon, category) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalDesc").innerText = desc;
            document.getElementById("modalPrice").innerHTML = `<span>Ціна:</span> ${price}`;
            document.getElementById("modalCategory").innerText = category;
            
            // Зміна іконки
            const iconElement = document.getElementById("modalIcon");
            iconElement.className = `fa-solid ${icon}`;
            
            modal.style.display = "flex";
            document.body.style.overflow = "hidden"; // Заборона скролу фону
        }

        function closeModal() {
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }

        // Закриття при кліку поза вікном
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>\
